<!DOCTYPE html>
<!-- ==================================================================
     DIAGRAM · Flowchart (kami palette)
     Decision logic with branches. One focal decision, two to four outcomes.
     Use when the structure IS the point. If a table communicates the
     same thing, use a table instead.
     ================================================================== -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flowchart · kami diagram</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --parchment:  #FFFDF5;
    --ivory:      #FFFFFF;
    --near-black: #000000;
    --olive:      #1F1F1F;
    --stone:      #000000;
    --brand:      #000000;
    --brand-tint: #C4B5FD;
    --border:     #C4B5FD;

    --serif: "Newsreader", "Source Serif 4", "Charter", Georgia, serif;
    --sans:  "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    --mono:  "JetBrains Mono", "SF Mono", Consolas, monospace;
  }

  body {
    font-family: var(--sans);
    background: var(--parchment);
    color: var(--near-black);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 2rem;
  }

  .frame { max-width: 960px; width: 100%; }

  .eyebrow {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--stone);
    margin-bottom: 0.5rem;
  }

  h1 {
    font-family: var(--serif);
    font-size: 1.9rem;
    font-weight: 500;
    letter-spacing: -0.3pt;
    line-height: 1.15;
    margin-bottom: 1.6rem;
  }

  svg { width: 100%; min-width: 820px; display: block; }

  .caption {
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.95rem;
    color: var(--olive);
    margin-top: 1rem;
    max-width: 52ch;
  }

  /* Theme override · neo-brutalism */
  body {
    padding: 8.5mm;
    background: var(--frame-blue);
    font-family: "Inter", "Source Han Sans SC", "Noto Sans CJK SC", "PingFang SC", Arial, sans-serif;
    font-weight: 700;
  }

  .folio,
  .sheet {
    background:
      radial-gradient(#000 0.55pt, transparent 0.6pt) 0 0 / 14pt 14pt,
      var(--parchment) !important;
    border: 2.2pt solid #000;
    box-shadow: 4mm 4mm 0 #FF6B6B;
  }

  .folio::before,
  .sheet::before { inset: 4.5mm; border: 1.6pt solid #000; }
  .folio::after,
  .sheet::after { inset: 7mm; border: 0.8pt solid #000; }

  .title-plaque {
    background: #FF6B6B !important;
    color: #000 !important;
    border: 2pt solid #000;
    box-shadow: 3mm 3mm 0 #000;
    transform: rotate(-0.35deg);
  }

  .title-plaque::before,
  .title-plaque::after { border-color: #000 !important; }

  h1, h2, h3, .side-title, .metric-value, .section-head .zh, .chapter-title, .letter-title {
    font-family: "Inter", "Source Han Sans SC", "Noto Sans CJK SC", "PingFang SC", Arial, sans-serif !important;
    font-weight: 900 !important;
    color: #000 !important;
    letter-spacing: 0 !important;
  }

  .subtitle, .eyebrow { color: #000 !important; font-weight: 800; }

  .side-card, .metric, .lead-panel, .panel, .content-card, .evidence-card, .quote, .callout, .timeline, table, .letter-body, .signature-card {
    background: #FFFFFF !important;
    border: 1.4pt solid #000 !important;
    border-radius: 0 !important;
    box-shadow: 1.8mm 1.8mm 0 #000;
  }

  .metric:nth-child(2n), .evidence-card:nth-child(2n), .content-card:nth-child(2n) { background: #FFD93D !important; }
  .metric:nth-child(3n), .evidence-card:nth-child(3n), .content-card:nth-child(3n) { background: #C4B5FD !important; }

  .tag, .label, .side-label, .section-head .en, th {
    background: #FFD93D !important;
    color: #000 !important;
    border: 1pt solid #000 !important;
    font-weight: 900 !important;
  }
</style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Flowchart · kami diagram</p>
    <h1>{{Question the flow answers}}</h1>

    <svg viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#5e5d59"/>
        </marker>
        <marker id="arrow-brand" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#000000"/>
        </marker>
      </defs>

      <rect width="100%" height="100%" fill="#FFFDF5"/>

      <!-- ========== Flow ========== -->
      <!-- Start → Check -->
      <line x1="430" y1="72" x2="430" y2="112" stroke="#5e5d59" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- Check → Decision (focal) -->
      <line x1="430" y1="176" x2="430" y2="216" stroke="#5e5d59" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- Decision → Yes branch (brand) -->
      <path d="M 360 268 L 200 268 L 200 332" fill="none" stroke="#000000" stroke-width="1.4" marker-end="url(#arrow-brand)"/>
      <rect x="170" y="284" width="34" height="14" rx="2" fill="#FFFDF5"/>
      <text x="187" y="294" fill="#000000" font-size="8" font-family="'JetBrains Mono', monospace" text-anchor="middle" letter-spacing="0.12em">YES</text>

      <!-- Decision → No branch -->
      <path d="M 500 268 L 660 268 L 660 332" fill="none" stroke="#5e5d59" stroke-width="1.2" marker-end="url(#arrow)"/>
      <rect x="636" y="284" width="30" height="14" rx="2" fill="#FFFDF5"/>
      <text x="651" y="294" fill="#5e5d59" font-size="8" font-family="'JetBrains Mono', monospace" text-anchor="middle" letter-spacing="0.12em">NO</text>

      <!-- Yes outcome → End -->
      <path d="M 200 396 L 200 440 L 396 440" fill="none" stroke="#5e5d59" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- No outcome → End -->
      <path d="M 660 396 L 660 440 L 464 440" fill="none" stroke="#5e5d59" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- ========== Nodes ========== -->

      <!-- Start (pill) -->
      <rect x="360" y="40" width="140" height="32" rx="16" fill="rgba(94,93,89,0.08)" stroke="#87867f" stroke-width="1"/>
      <text x="430" y="60" fill="#000000" font-size="11" font-weight="500" font-family="'Inter', sans-serif" text-anchor="middle">Start</text>

      <!-- Check step -->
      <rect x="350" y="112" width="160" height="64" rx="6" fill="#ffffff" stroke="#000000" stroke-width="1"/>
      <text x="364" y="130" fill="#5e5d59" font-size="7" font-family="'JetBrains Mono', monospace" letter-spacing="0.15em">STEP 01</text>
      <text x="430" y="150" fill="#000000" font-size="12" font-weight="600" font-family="'Inter', sans-serif" text-anchor="middle">{{Describe input}}</text>
      <text x="430" y="166" fill="#5e5d59" font-size="9" font-family="'Inter', sans-serif" text-anchor="middle">one short line</text>

      <!-- Decision diamond (FOCAL) -->
      <polygon points="430,216 500,242 500,268 430,320 360,268 360,242"
               fill="#EEF2F7" stroke="#000000" stroke-width="1.2"/>
      <text x="430" y="266" fill="#000000" font-size="11" font-weight="600" font-family="'Inter', sans-serif" text-anchor="middle">{{Decision}}</text>
      <text x="430" y="282" fill="#000000" font-size="8" font-family="'JetBrains Mono', monospace" text-anchor="middle" letter-spacing="0.15em">BRANCH</text>

      <!-- Yes outcome -->
      <rect x="120" y="332" width="160" height="64" rx="6" fill="#ffffff" stroke="#000000" stroke-width="1"/>
      <text x="134" y="350" fill="#5e5d59" font-size="7" font-family="'JetBrains Mono', monospace" letter-spacing="0.15em">OUTCOME A</text>
      <text x="200" y="370" fill="#000000" font-size="12" font-weight="600" font-family="'Inter', sans-serif" text-anchor="middle">{{Path taken}}</text>
      <text x="200" y="386" fill="#5e5d59" font-size="9" font-family="'Inter', sans-serif" text-anchor="middle">what happens next</text>

      <!-- No outcome -->
      <rect x="580" y="332" width="160" height="64" rx="6" fill="rgba(20,20,19,0.03)" stroke="rgba(20,20,19,0.30)" stroke-width="1"/>
      <text x="594" y="350" fill="#87867f" font-size="7" font-family="'JetBrains Mono', monospace" letter-spacing="0.15em">OUTCOME B</text>
      <text x="660" y="370" fill="#000000" font-size="12" font-weight="600" font-family="'Inter', sans-serif" text-anchor="middle">{{Alt path}}</text>
      <text x="660" y="386" fill="#5e5d59" font-size="9" font-family="'Inter', sans-serif" text-anchor="middle">skipped / deferred</text>

      <!-- End (pill) -->
      <rect x="396" y="424" width="68" height="32" rx="16" fill="rgba(94,93,89,0.08)" stroke="#87867f" stroke-width="1"/>
      <text x="430" y="444" fill="#000000" font-size="11" font-weight="500" font-family="'Inter', sans-serif" text-anchor="middle">End</text>

      <!-- Legend -->
      <line x1="40" y1="484" x2="820" y2="484" stroke="rgba(20,20,19,0.10)" stroke-width="0.8"/>
      <text x="40" y="500" fill="#5e5d59" font-size="8" font-family="'JetBrains Mono', monospace" letter-spacing="0.22em">LEGEND</text>

      <polygon points="180,492 192,498 180,504 168,498" fill="#EEF2F7" stroke="#000000" stroke-width="1"/>
      <text x="202" y="502" fill="#5e5d59" font-size="8.5" font-family="'Inter', sans-serif">Focal decision</text>

      <rect x="310" y="494" width="14" height="10" rx="2" fill="#ffffff" stroke="#000000" stroke-width="1"/>
      <text x="330" y="502" fill="#5e5d59" font-size="8.5" font-family="'Inter', sans-serif">Step · outcome</text>

      <rect x="440" y="494" width="14" height="10" rx="16" fill="rgba(94,93,89,0.08)" stroke="#87867f" stroke-width="1"/>
      <text x="460" y="502" fill="#5e5d59" font-size="8.5" font-family="'Inter', sans-serif">Start · end</text>

      <rect x="560" y="494" width="14" height="10" rx="2" fill="rgba(20,20,19,0.03)" stroke="rgba(20,20,19,0.30)" stroke-width="1"/>
      <text x="580" y="502" fill="#5e5d59" font-size="8.5" font-family="'Inter', sans-serif">Deferred branch</text>
    </svg>

    <p class="caption">The decision diamond carries the accent. Its two branches diverge into equal weights so the reader sees the question, not an implied answer.</p>
  </div>
</body>
</html>
